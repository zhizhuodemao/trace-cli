name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Job 1: 构建 trace-cli 独立二进制（纯 Rust，不需要前端）
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build trace-cli binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename trace-cli binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/trace-cli trace-cli-${{ matrix.target }}

      - name: Rename trace-cli binary (Windows)
        if: matrix.platform == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/trace-cli.exe trace-cli-${{ matrix.target }}.exe

      - name: Upload trace-cli binary
        uses: actions/upload-artifact@v4
        with:
          name: trace-cli-${{ matrix.label }}
          path: trace-cli-${{ matrix.target }}*

