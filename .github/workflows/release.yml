name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-cli:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: macos-latest
            target: x86_64-apple-darwin
            label: macOS-x64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: Linux-x64

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2

      - name: Build trace-cli binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename trace-cli binary (Unix)
        if: matrix.platform != 'windows-latest'
        run: cp target/${{ matrix.target }}/release/trace-cli trace-cli-${{ matrix.target }}

      - name: Rename trace-cli binary (Windows)
        if: matrix.platform == 'windows-latest'
        run: cp target/${{ matrix.target }}/release/trace-cli.exe trace-cli-${{ matrix.target }}.exe

      - name: Upload trace-cli binary
        uses: actions/upload-artifact@v4
        with:
          name: trace-cli-${{ matrix.label }}
          path: trace-cli-${{ matrix.target }}*

  release:
    needs: build-cli
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
